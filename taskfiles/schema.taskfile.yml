# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  generate:
    desc: Generate the JSON Schemas for grimoire.toml, publish.toml, and grimoire.lock into docs/src/schemas/
    summary: |
      Runs the compiled `grim schema` for each kind and writes the pretty
      JSON into docs/src/schemas/. mdBook copies those files verbatim into
      the published site.

      The schemas are generated artifacts, NOT committed: they are
      gitignored and the docs build (`task docs:build`) regenerates them on
      every run, so the published site can never drift from the parser.
      Caching is deliberately omitted here — the `grim schema` calls are
      sub-millisecond once the binary is built, and always running them is
      what guarantees freshness.
    deps:
      - :rust:build
    generates:
      - '{{.ROOT_DIR}}/docs/src/schemas/grimoire-config.schema.json'
      - '{{.ROOT_DIR}}/docs/src/schemas/grim-publish.schema.json'
      - '{{.ROOT_DIR}}/docs/src/schemas/grimoire-lock.schema.json'
    cmds:
      - mkdir -p {{.ROOT_DIR}}/docs/src/schemas
      - '{{.ROOT_DIR}}/target/release/grim schema --kind config > {{.ROOT_DIR}}/docs/src/schemas/grimoire-config.schema.json'
      - '{{.ROOT_DIR}}/target/release/grim schema --kind publish > {{.ROOT_DIR}}/docs/src/schemas/grim-publish.schema.json'
      - '{{.ROOT_DIR}}/target/release/grim schema --kind lock > {{.ROOT_DIR}}/docs/src/schemas/grimoire-lock.schema.json'
