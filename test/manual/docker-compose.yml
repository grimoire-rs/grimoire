# Local OCI registries for the manual rig, on their OWN ports (5050, 5051)
# and own containers/volumes — deliberately isolated from the pytest
# acceptance suite's registry (localhost:5000). The acceptance suite pushes
# hundreds of throwaway `grim-test/<uuid>` repos; sharing one registry made
# them bleed into `grim search` / `grim tui` here as junk. Keep them separate.
#
# Two registries exist so the rig can exercise the multi-registry feature
# (`[[registries]]` aliases, browse-all-declared): 5050 hosts the primary
# `grimoire` catalog, 5051 hosts a small `tools` subset (see bootstrap.sh
# and project-multi/). A single `docker compose up -d` starts both.
services:
  registry:
    image: registry:2
    container_name: grim-manual-registry
    ports:
      - "5050:5000"
    volumes:
      - grim-manual-registry-data:/var/lib/registry

  registry-2:
    image: registry:2
    container_name: grim-manual-registry-2
    ports:
      - "5051:5000"
    volumes:
      - grim-manual-registry-2-data:/var/lib/registry

volumes:
  grim-manual-registry-data:
  grim-manual-registry-2-data:
