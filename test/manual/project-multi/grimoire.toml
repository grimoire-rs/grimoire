# A multi-registry consumer project for the manual rig.
#
#   cd test/manual/project-multi
#   source ../scripts/env.sh
#   unset GRIM_DEFAULT_REGISTRY   # see note below — it forces a single registry
#   grim search                  # browses BOTH declared registries
#   grim lock && grim install    # pins the fully-qualified refs below
#   grim status                  # all 'installed'
#
# Declaring two registries with `[[registries]]` makes `grim search`
# (no --registry) browse ALL declared registries and surface packages from
# each (browse-all-declared). bootstrap.sh publishes the primary `grimoire`
# catalog to 5050 and a small `tools` subset (commit-helper, security-baseline)
# to 5051, so both registries have content to browse.
#
# IMPORTANT — `$GRIM_DEFAULT_REGISTRY` (set by scripts/env.sh) and the
# `--registry` flag each FORCE a single-registry browse by design, which
# overrides `[[registries]]`. To exercise browse-all here, `unset
# GRIM_DEFAULT_REGISTRY` first (the `default = true` registry below then
# anchors short-id resolution).
#
# Declared refs are FULLY QUALIFIED. The `alias/repo:tag` shorthand is a
# `grim add` CLI convenience (expanded at add-time, e.g.
# `grim add tools/rules/security-baseline:1`), not a persisted config form —
# `grim lock` expects `registry/repo:tag` (or a short id resolving to the
# `default = true` registry).

[options]
clients = ["claude"]

# Primary registry (5050). `default = true` anchors short-id + `grim add`
# resolution. `url` is the host + namespace its alias expands against.
[[registries]]
alias = "primary"
url = "localhost:5050/grimoire"
default = true

# Second registry (5051) — the multi-registry demo target.
[[registries]]
alias = "tools"
url = "localhost:5051/tools"

[skills]
# Primary registry (5050).
hello-world = "localhost:5050/grimoire/skills/hello-world:1"
# Second registry (5051) — same artifact, different host.
commit-helper = "localhost:5051/tools/skills/commit-helper:1"

[rules]
# Second registry (5051).
security-baseline = "localhost:5051/tools/rules/security-baseline:1"
