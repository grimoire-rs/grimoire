# First-party starter bundle: install all three grim knowledge skills at once.
#
#   grim add --kind bundle grim.ocx.sh/bundles/grim-essentials:1
#
# Members reference the floating major tag (:1) so skill patch releases
# reach consumers via cascade tags + `grim update` without a bundle
# re-release. Published without --pin for the same reason.

summary = "Grimoire first-party starter pack"
keywords = "grimoire,grim,skills,authoring,ai-config,oci,starter"
description = "First-party skills: using the grim CLI, vendor-neutral AI-config authoring craft, and grim artifact authoring"
repository = "https://github.com/michael-herwig/grimoire"

[skills]
grim-usage = "grim.ocx.sh/skills/grim-usage:1"
ai-config-authoring = "grim.ocx.sh/skills/ai-config-authoring:1"
grim-authoring = "grim.ocx.sh/skills/grim-authoring:1"
