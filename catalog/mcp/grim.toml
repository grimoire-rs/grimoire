# grim's own MCP server: `grim mcp` exposes the catalog (grim_search) and
# install state (grim_status) to AI agents over stdio. Read-only by
# default; the scope is fixed at launch.
#
# TODO: reconsider global vs project launch semantics — `grim mcp` takes
# `--global`, but baking a scope flag into this descriptor would pin every
# consumer to one scope. v1 ships the default (project-scope) launch; a
# scope-aware story (e.g. the server emitting rendered artifacts for a
# requested vendor/scope) is a follow-up.
description = "Grimoire catalog search and install status over the Model Context Protocol."
summary = "grim as an MCP server (read-only catalog + status)"
keywords = "grimoire,mcp,catalog,search,status"
repository = "https://github.com/grimoire-rs/grimoire"

[server]
transport = "stdio"
command = "grim"
args = ["mcp"]
